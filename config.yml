          title: "Prof. Anat Ben-David"
          subtitle: |
              I am an Associate Professor of Communication at the Open University of Israel.
              My research examines the intersections of digital media, memory, and politics, with a focus on social media, web archives, and the infrastructures that shape online knowledge. I employ digital and computational methods to study how platforms mediate collective memory, historical narratives, and sociotechnical power.

              **Extracurricular activities:** Board member of the independent journalism website [The Seventh Eye](https://www.the7eye.org.il/about/english).

              **New book:**

              <img src="routledge-companion-cover.webp" alt="The Routledge Companion to Transnational Web Archive Studies" width="140" style="border-radius:0;border:none;"><br>
              Aasman, S., Ben-David, A., & Brügger, N. (2025). [The Routledge Companion to Transnational Web Archive Studies](https://www.routledge.com/The-Routledge-Companion-to-Transnational-Web-Archive-Studies/Aasman-Ben-David-Brugger/p/book/9781032497785). Taylor & Francis Group.

              For a full academic CV, please refer to my homepage at the Open University's website.

              Contact: anatbd[@]openu.ac.il
